name: OnmiCore
version: '${version}'
description: Comprehensive block logging & Git-style timeline rollback system
main: cn.oneachina.onmiCore.OnmiCore
api-version: '1.21.11'
load: POSTWORLD
authors: [ oneachina ]

commands:
  oc:
    description: OnmiCore main command
    usage: /oc <subcommand>
    permission: onmicore.use

permissions:
  onmicore.use:
    description: Allow using OnmiCore commands
    default: op
  onmicore.admin:
    description: Allow administrative commands (status, reload, migrate)
    default: op
  onmicore.rollback:
    description: Allow rollback and restore operations
    default: op
  onmicore.web.view:
    description: Allow viewing the web panel
    default: op
  onmicore.web.rollback:
    description: Allow executing rollback from the web panel
    default: op
  onmicore.web.admin:
    description: Allow admin-level actions in the web panel
    default: op
